# ZRobot Perception Configuration
# Parameters for yolo_detector_node (Python RKNN)

zrobot_perception:
  ros__parameters:
    # Model
    model_path: "models/yolo26s-rk3588.rknn"

    # Camera
    camera_id: 1
    width: 640
    height: 640
    fps: 30

    # Detection thresholds
    obj_thresh: 0.25
    nms_thresh: 0.45

    # NPU
    num_npu_cores: 3

    # Target & tracking
    target_object: "person"
    enable_tracking: true
    show_category: true

    # Auto-follow
    enable_auto_follow: true
    search_delay_sec: 15
    max_linear_speed: 0.15
    turn_speed: 0.8
